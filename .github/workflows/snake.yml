name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: priyankasml
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

**Step 5** → Scroll down → Click **"Commit new file"**

**Step 6** → Go to **Actions** tab in your repo

**Step 7** → Click **"Generate Snake Animation"** → Click **"Run workflow"** → **"Run workflow"** green button

**Step 8** → Wait 1-2 minutes → Snake is ready ✅

---

After that the snake SVG will be at:
```
https://raw.githubusercontent.com/priyankasml/priyankasml/output/github-snake-dark.svg
